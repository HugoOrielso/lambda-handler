name: Deploy Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  LAMBDA_FUNCTION_NAME: spacex-launches-handler

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: |
          pytest test/test_lambda_function.py -v \
            --cov=lambda_function \
            --cov-report=term-missing \
            --cov-fail-under=80

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current version for rollback
        id: prev_version
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --description "pre-deploy snapshot - ${{ github.sha }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Version' \
            --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Saved version $VERSION as rollback point"

      - name: Build deployment package
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package/
          cp lambda_function.py package/
          cd package && zip -r ../lambda-deployment.zip . && cd ..
          echo "📦 Package size: $(du -sh lambda-deployment.zip | cut -f1)"

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda-deployment.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Smoke test — invoke Lambda
        id: smoke_test
        run: |
          RESPONSE=$(aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --payload '{"httpMethod":"GET"}' \
            --cli-binary-format raw-in-base64-out \
            output.json \
            --query 'StatusCode' \
            --output text)

          echo "status=$RESPONSE" >> $GITHUB_OUTPUT
          cat output.json

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Smoke test failed with status $RESPONSE"
            exit 1
          fi
          echo "✅ Smoke test passed"

      - name: Rollback on failure
        if: failure() && steps.smoke_test.conclusion == 'failure'
        run: |
          echo "🔁 Rolling back to version ${{ steps.prev_version.outputs.version }}"
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --s3-bucket "" || true

          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --name live \
            --function-version ${{ steps.prev_version.outputs.version }} \
            --region ${{ env.AWS_REGION }} || true

          echo "⚠️ Rolled back to version ${{ steps.prev_version.outputs.version }}"

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.{State:State,LastModified:LastModified}' \
            --output table

      - name: ✅ Done
        run: echo "Lambda ${{ env.LAMBDA_FUNCTION_NAME }} deployed successfully"